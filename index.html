<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI量化 - 京东方A数据面板</title>
<style>
  :root { --bg: #f5f6fa; --card: #fff; --text: #2c3e50; --primary: #3498db; --up: #e74c3c; }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { font-family: -apple-system, BlinkMacSystemFont, "Microsoft YaHei", sans-serif; background: var(--bg); min-height: 100vh; display: flex; align-items: center; justify-content: center; }
  .card { background: var(--card); border-radius: 16px; padding: 48px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); text-align: center; max-width: 480px; }
  h1 { font-size: 28px; color: var(--text); margin-bottom: 8px; }
  .sub { color: #7f8c8d; margin-bottom: 32px; font-size: 14px; }
  .link { display: block; background: var(--primary); color: #fff; text-decoration: none; padding: 14px 32px; border-radius: 8px; font-size: 16px; margin-bottom: 12px; transition: opacity 0.2s; }
  .link:hover { opacity: 0.88; }
  .link.sec { background: #fff; color: var(--primary); border: 1.5px solid var(--primary); }
  .info { margin-top: 24px; color: var(--up); font-size: 14px; }
</style>
</head>
<body>
  <div class="card">
    <h1>📊 京东方A 数据面板</h1>
    <p class="sub">000725.SZ · 2025.07.02 — 2026.07.02</p>
    <a class="link" href="./boe_dashboard.html">查看 K 线图 & 成交量面板</a>
    <a class="link sec" href="./京东方A_日线数据.xlsx">下载 Excel 日线数据</a>
    <p class="info">最新价 ¥9.15 · 一年涨幅 +132.82%</p>
  </div>
</body>
</html>
